<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antigravity Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="app">
      <div class="sidebar">
        <div class="sidebar-header">
          <h1>Chat History</h1>
          <button id="new-chat-btn" title="New Chat">+</button>
        </div>
        <div id="history-list" class="history-list">
          <!-- History items will be injected here -->
        </div>
        <div class="sidebar-footer">
          <div class="settings-section">
            <div class="settings-header">
              <h3>API Settings</h3>
              <button id="toggle-settings-btn" title="Toggle Settings">⚙️</button>
            </div>
            <div id="api-key-container" class="api-key-container hidden">
              <div class="api-input-group">
                <input type="password" id="api-key-input" placeholder="Hugging Face API Key">
                <button id="show-key-btn" title="Show/Hide Key">👁️</button>
              </div>
              <div class="api-actions">
                <button id="save-key-btn">Save Key</button>
                <button id="clear-key-btn">Clear</button>
              </div>
              <p class="api-note">Your key is stored locally in your browser.</p>
            </div>
          </div>
        </div>
      </div>
      
      <main class="chat-container">
        <header class="chat-header">
          <div class="model-info">
            <span class="status-indicator"></span>
            <h2>Llama-3.1-8B</h2>
          </div>
          <button id="clear-chat-btn">Clear Current</button>
        </header>
        
        <div class="mode-selector">
          <button class="mode-btn active" data-mode="chat">Chat</button>
          <button class="mode-btn" data-mode="summarization">Summarization</button>
          <button class="mode-btn" data-mode="sentiment">Sentiment</button>
          <button class="mode-btn" data-mode="generation">Text Gen</button>
          <button class="mode-btn" data-mode="translation">Translation</button>
        </div>
        
        <div id="chat-messages" class="chat-messages">
          <!-- Messages will be injected here -->
          <div class="welcome-message">
            <div class="bot-icon">🤖</div>
            <h2>Hello! I'm your AI assistant.</h2>
            <p>How can I help you today? I'll remember our conversation history.</p>
          </div>
        </div>
        
        <div class="input-area">
          <div id="generation-controls" class="mode-controls hidden">
            <label for="max-tokens">Max Tokens: <span id="token-val">50</span></label>
            <input type="range" id="max-tokens" min="10" max="200" value="50">
          </div>
          <div class="input-wrapper">
            <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
            <button id="send-btn" disabled>
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
